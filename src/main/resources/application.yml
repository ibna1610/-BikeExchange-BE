spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: BikeExchange-Backend

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: true
    properties:
      hibernate:
        format_sql: true
        enable_lazy_load_no_trans: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bike_exchange}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  mvc:
    throw-exception-if-no-handler-found: true

  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: a44240001@smtp-brevo.com
    password: ${BREVO_SMTP_KEY:dev-brevo-key}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    from-email: ${MAIL_FROM_EMAIL:${spring.mail.username}}

server:
  servlet:
    context-path: /api
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    root: INFO
    com.bikeexchange: DEBUG
    org.hibernate.tool.schema: WARN
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO

app:
  jwtSecret: ${JWT_SECRET:dev-jwt-secret-change-me-in-env-2026-dev-jwt-secret-change-me}
  jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000}
  frontend.url: ${FRONTEND_URL:http://localhost:5173}
  forgot-password.url: ${FORGOT_PASSWORD_URL:http://localhost:5173/reset-password}
  name: BikeExchange

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

vnpay:
  tmnCode: ${VNP_TMN_CODE:DEV_TMN_CODE}
  hashSecret: ${VNP_HASH_SECRET:DEV_HASH_SECRET}
  payUrl: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  #returnUrl: ${VNP_RETURN_URL:http://localhost:8080/api/vnpay/vnpay-payment-return}
  returnUrl: ${VNP_RETURN_URL:http://localhost:5173/payment-success}
  ipnUrl: ${VNP_IPN_URL:http://localhost:8080/api/vnpay/ipn}