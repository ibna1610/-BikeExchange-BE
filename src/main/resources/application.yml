spring:
  application:
    name: BikeExchange-Backend

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: true
    properties:
      hibernate:
        format_sql: true
        enable_lazy_load_no_trans: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bike_exchange}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  mvc:
    throw-exception-if-no-handler-found: true

  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: a44240001@smtp-brevo.com
    password: ${BREVO_SMTP_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    from-email: chinsucuc@gmail.com

server:
  servlet:
    context-path: /api
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    root: INFO
    com.bikeexchange: DEBUG
    org.hibernate.tool.schema: WARN
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO

app:
  jwtSecret: ${JWT_SECRET:926D96C90030DD58429D2751AC1BDBBC926D96C90030DD58429D2751AC1BDBBC}
  jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000}
  frontend.url: ${FRONTEND_URL:http://localhost:5173}
  forgot-password.url: ${FORGOT_PASSWORD_URL:http://localhost:5173/reset-password}
  name: BikeExchange
  order-rule:
    defaults:
      return-window:
        days: ${ORDER_RETURN_WINDOW_DAYS_DEFAULT:14}
        hours: ${ORDER_RETURN_WINDOW_HOURS_DEFAULT:0}
        minutes: ${ORDER_RETURN_WINDOW_MINUTES_DEFAULT:0}

vnpay:
  tmnCode: ${VNP_TMN_CODE:B2H6WZFU}
  hashSecret: ${VNP_HASH_SECRET:PCC5IVNXNSUTMNJ1BA92NBI1MXB50C2P}
  payUrl: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
